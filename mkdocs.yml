site_name: Unsafe Autonomy Bench
site_description: Taxonomy-first benchmark for evaluating autonomous agent safety, utility, and capability control.
site_url: https://samvritsrinath.github.io/agentTaxonomy/
repo_url: https://github.com/SamvritSrinath/agentTaxonomy
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Evaluation: evaluation.md
  - Task Authoring: authoring.md
# autogenerated-api-nav-start
  - API Reference:
      - Overview: api/index.md
      - Catalog: api/catalog.md
      - CLI: api/cli.md
      - Generation: api/generate.md
      - Harness: api/harness.md
      - Judge: api/judge.md
      - Schema: api/schema.md
      - Scoring: api/scoring.md
      - Trace: api/trace.md
  # autogenerated-api-nav-end
